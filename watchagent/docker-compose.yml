services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: watchagent
      POSTGRES_PASSWORD: watchagent
      POSTGRES_DB: watchagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchagent -d watchagent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  poller:
    build:
      context: .
      dockerfile: Dockerfile.poller
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
